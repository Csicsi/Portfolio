name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          echo "🔧 Creating ~/.ssh..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
      
          echo "🔐 Writing private key to ~/.ssh/id_ed25519"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      
          echo "🔑 Adding ${{ secrets.SSH_HOST }} to known_hosts"
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      
          echo "📂 ~/.ssh contents:"
          ls -la ~/.ssh
