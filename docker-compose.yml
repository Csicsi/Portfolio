services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vite_dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host

  prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: vite_prod
    ports:
      - "8080:80"
