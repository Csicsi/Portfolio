services:

  prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: vite_prod
    expose:
      - "80"
    networks:
      - site-network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    depends_on:
      - prod
    ports:
      - "8888:80"
    volumes:
      - ./nginx/:/etc/nginx/conf.d:ro
    networks:
      - site-network

networks:
  site-network:
